<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FIFI — Returning</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple-start: #9333ea;
      --purple-end:   #c026d3;
      --bg-gradient:  linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --card-bg:      #ffffff;
      --text-primary: #111827;
      --text-muted:   #6b7280;
      --divider:      #e5e7eb;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-gradient);
      font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      padding: 24px;
    }

    .card {
      background: var(--card-bg);
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 480px;
      width: 100%;
      overflow: hidden;
      animation: rise 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-hero {
      background: linear-gradient(135deg, var(--purple-start) 0%, var(--purple-end) 100%);
      padding: 32px 40px 28px;
      text-align: center;
    }

    .wordmark {
      font-size: 42px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #ffffff;
      background: transparent;
      display: inline-block;
      padding: 10px 22px;
      line-height: 1;
      margin-bottom: 4px;
      user-select: none;
    }

    .tagline {
      font-size: 13px;
      color: rgba(255,255,255,0.75);
      font-weight: 400;
    }

    .card-body {
      padding: 40px 40px 36px;
      text-align: center;
    }

    .spinner-ring {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 3px solid #e5e7eb;
      border-top-color: var(--purple-start);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .card-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 12px;
    }

    .card-body p {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 8px;
    }

    .card-footer {
      padding: 16px 40px 28px;
      text-align: center;
    }

    .card-footer p {
      font-size: 11px;
      color: #9ca3af;
    }

    .card-footer a {
      color: var(--purple-start);
      text-decoration: none;
    }

    .card-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="card">

    <div class="card-hero">
      <div class="wordmark">FIFI</div>
      <p class="tagline">A clearer view of where Reddit threads intensify.</p>
    </div>

    <div class="card-body">

      <div class="spinner-ring"></div>

      <h1 class="card-title">Closing this tab...</h1>
      <p>Your subscription has been updated. Head back to Reddit and click the FIFI button to continue.</p>

    </div>

    <div class="card-footer">
      <p>FIFI · <a href="https://fifiapp.app/privacy" target="_blank" rel="noopener">Privacy Policy</a> · <a href="mailto:fifiapp.contact@gmail.com">Feedback</a></p>
    </div>

  </div>

  <script>
    // Attempt to close the tab automatically.
    // window.close() only works if the tab was opened by a script —
    // if the user navigated here directly it will silently fail,
    // which is acceptable behaviour.
    setTimeout(() => {
      window.close();
    }, 1500);
  </script>

</body>
</html>
